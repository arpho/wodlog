<ion-button id="user-menu-trigger" fill="clear">
  <div class="user-info">
    @if (loggedUser().email) {
      <ion-text class="user-email ion-hide-md-down">{{ loggedUser().email }}</ion-text>
    }
    @if (gravatarUrl()) {
      <ion-avatar slot="start" class="user-avatar">
        <img [src]="gravatarUrl()" alt="User Avatar" />
      </ion-avatar>
    } @else {
      <ion-icon name="person-circle-outline" size="large"></ion-icon>
    }
  </div>
</ion-button>

<ion-popover trigger="user-menu-trigger" dismissOnSelect="true">
  <ng-template>
    <ion-content>
      <ion-list lines="none">
        
        <ion-item button (click)="openPrList()" detail="false">
          <ion-thumbnail slot="start" class="menu-thumbnail">
            <img src="assets/images/Pr.png" alt="PRs" />
          </ion-thumbnail>
          <ion-label>I miei PR</ion-label>
        </ion-item>

        <ion-item button (click)="openWodList()" detail="false">
          <ion-thumbnail slot="start" class="menu-thumbnail">
            <img src="assets/images/wod.png" alt="WODs" />
          </ion-thumbnail>
          <ion-label>I miei WOD</ion-label>
        </ion-item>

        <ion-item button (click)="openProfile()" detail="false">
          <ion-icon name="person-outline" slot="start"></ion-icon>
          <ion-label>Profilo</ion-label>
        </ion-item>

        <ion-item button (click)="openChangelog()" detail="false">
          <ion-icon name="list-outline" slot="start"></ion-icon>
          <ion-label>Changelog</ion-label>
        </ion-item>

        <ion-item button (click)="logout()" detail="false" lines="none" color="danger">
          <ion-icon name="log-out-outline" slot="start"></ion-icon>
          <ion-label>Logout</ion-label>
        </ion-item>

      </ion-list>
    </ion-content>
  </ng-template>
</ion-popover>
