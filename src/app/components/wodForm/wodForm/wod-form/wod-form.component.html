<div class="form-container">
  <div class="glass-effect form-section">
    <h2 class="section-title">Informazioni Generali</h2>
    <ion-item class="glass-input-item">
      <ion-input
        type="text"
        label="Nome WOD"
        [value]="title()"
        (ionChange)="updateName($event)"
        labelPlacement="floating"
      ></ion-input>
    </ion-item>
    
    <ion-item class="glass-input-item">
      <ion-input
        type="text"
        label="Note"
        [value]="note()"
        (ionChange)="updateNote($event)"
        labelPlacement="floating"
      ></ion-input>
    </ion-item>

    <div class="date-picker-wrapper">
      <ion-datetime
        [value]="formatDate4Picker()"
        (ionChange)="updateDate($event)"
        presentation="date"
        class="glass-datetime"
      ></ion-datetime>
    </div>
  </div>

  <div class="glass-effect form-section">
    <h2 class="section-title">Categorie</h2>
    <div class="toggles-grid">
      <div class="toggle-wrapper" [class.active]="hero()">
        <ion-toggle [checked]="hero()" (ionChange)="updateHero($event)">Hero</ion-toggle>
      </div>
      <div class="toggle-wrapper" [class.active]="girl()">
        <ion-toggle [checked]="girl()" (ionChange)="updateGirl($event)">Girl</ion-toggle>
      </div>
      <div class="toggle-wrapper" [class.active]="benchmark()">
        <ion-toggle [checked]="benchmark()" (ionChange)="updateBenchmark($event)">Benchmark</ion-toggle>
      </div>
    </div>
  </div>

  <div class="exercises-grid">
    <div class="glass-effect form-section exercise-column">
      <div class="section-header">
        <h2 class="section-title">Forza</h2>
        <ion-button fill="clear" size="small" (click)="addForce()">
          <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
        </ion-button>
      </div>
      
      <ion-item class="glass-input-item mini-input">
        <ion-input
          type="text"
          placeholder="Aggiungi esercizio..."
          (ionChange)="updateForce($event)"
          [value]="force2Input"
        ></ion-input>
      </ion-item>

      <div class="exercise-list">
        @for(item of force(); track item; let index =$index){
          <div class="exercise-item glass-effect" (click)="editForce(item,index)">
            {{ item }}
          </div>
        }
      </div>
    </div>

    <div class="glass-effect form-section exercise-column">
      <div class="section-header">
        <h2 class="section-title">WOD</h2>
        <ion-button fill="clear" size="small" (click)="addActivity()">
          <ion-icon slot="icon-only" name="add-circle-outline"></ion-icon>
        </ion-button>
      </div>

      <ion-item class="glass-input-item mini-input">
        <ion-input
          type="text"
          placeholder="Aggiungi esercizio..."
          (ionChange)="updateWod($event)"
          [value]="wod2Input()"
        ></ion-input>
      </ion-item>

      <div class="exercise-list">
        @for(item of wod(); track item; let index=$index){
          <div class="exercise-item glass-effect" (click)="editWod(item,index)">
            {{ item }}
          </div>
        }
      </div>
    </div>
  </div>

  <div class="actions-footer">
    <ion-button (click)="submit()" class="save-button" expand="block">
      Salva Allenamento
      <ion-icon slot="end" name="checkmark-done-outline"></ion-icon>
    </ion-button>
  </div>
</div>
