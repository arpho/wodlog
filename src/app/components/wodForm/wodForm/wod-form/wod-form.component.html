
<ion-input
  type="text"
  label="nome wod"
  [value]="title()"
  (ionChange)="updateName($event)"
  [value]="title()"
  labelPlacement="floating"
></ion-input>
<ion-input
  type="text"
  label="note"
  [value]="note()"
  (ionChange)="updateNote($event)"
  [value]="note()"
  labelPlacement="floating"
></ion-input>
<ion-datetime
  [value]="formatDate4Picker()"
  (ionChange)="updateDate($event)"
  presentation="date"
></ion-datetime>

<div class="switches">
  <div id="hero">
  <ion-toggle labelPlacement="start" [ngClass]="{'isAnHero':hero()}" [checked]="hero()" (ionChange)="updateHero($event)">Hero</ion-toggle> @if(hero()){
    <ion-icon name="checkmark-outline"></ion-icon>
  }
  </div>
  <div id="girl">
  <ion-toggle labelPlacement="start"  [ngClass]="{'isAGirl':girl()}" [checked]="girl()" (ionChange)="updateGirl($event)">Girl</ion-toggle>
  @if (girl()) {
    <ion-icon name="checkmark-outline"></ion-icon>
  }
  </div>
  <div id="benchmark">
  <ion-toggle labelPlacement="start"  [ngClass]="{'isABenchmark':benchmark()}" [checked]="benchmark()" (ionChange)="updateBenchmark($event)">Bechmark</ion-toggle>@if (benchmark()) {
    <ion-icon name="checkmark-outline"></ion-icon>
  }
    </div>

</div>
<ion-grid>
  <ion-row>
    <!-- COLONNA FORZA -->
    <ion-col size="12" size-md="6">
      <h2 class="ion-text-center">forza</h2>
      
      <ion-list>
        <ion-item>
          <ion-input
            type="text"
            label="esercizio di forza"
            (ionChange)="updateForce($event)"
            [value]="force2Input"
            labelPlacement="floating"
          ></ion-input>
        </ion-item>
        
        <ion-reorder-group [disabled]="false" (ionItemReorder)="handleReorderForce($event)">
          @for(item of force(); track item; let index = $index) {
            <ion-item>
              <ion-label (click)="editForce(item, index)">{{ item }}</ion-label>
              <ion-reorder slot="end"></ion-reorder>
            </ion-item>
          }
        </ion-reorder-group>
      </ion-list>
      
      <div style="display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 15px; margin-bottom: 25px;">
        <ion-fab-button size="small" color="light" (click)="addForce()" >
          <ion-icon name="add"></ion-icon>
        </ion-fab-button>
        <ion-fab-button size="small" color="tertiary" (click)="scanForce()" >
          <ion-icon src="assets/icon/camera-ai.svg" class="ai-camera-icon"></ion-icon>
        </ion-fab-button>
      </div>
    </ion-col>

    <!-- COLONNA WOD -->
    <ion-col size="12" size-md="6">
      <h2 class="ion-text-center">wod</h2>
      
      <ion-list>
        <ion-item>
          <ion-input
            type="text"
            label="esercizio di wod"
            (ionChange)="updateWod($event)"
            [value]="wod2Input()"
            labelPlacement="floating"
          ></ion-input>
        </ion-item>
        
        <ion-reorder-group [disabled]="false" (ionItemReorder)="handleReorderWod($event)">
          @for(item of wod(); track item; let index = $index) {
            <ion-item>
              <ion-label (click)="editWod(item, index)">{{ item }}</ion-label>
              <ion-reorder slot="end"></ion-reorder>
            </ion-item>
          }
        </ion-reorder-group>
      </ion-list>
      
      <div style="display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 15px; margin-bottom: 25px;">
        <ion-fab-button size="small" color="light" (click)="addActivity()" >
          <ion-icon name="add"></ion-icon>
        </ion-fab-button>
        <ion-fab-button size="small" color="tertiary" (click)="scanWod()" >
          <ion-icon src="assets/icon/camera-ai.svg" class="ai-camera-icon"></ion-icon>
        </ion-fab-button>
      </div>
    </ion-col>
  </ion-row>
</ion-grid>



<ion-button (click)="submit()" color="light" slot="end" shape="round"
  >Save<ion-icon name="save-outline"></ion-icon
></ion-button>
