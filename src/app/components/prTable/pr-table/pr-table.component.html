<div class="search-container">
  <ion-searchbar 
    placeholder="Cerca esercizio..." 
    show-clear-button="focus" 
    (ionInput)="search($event)"
    class="glass-searchbar">
  </ion-searchbar>
</div>

<div class="pr-list-container">
  @for (pr of prList | filterPipe:filter; track pr.key) {
    <div class="pr-card glass-effect" (click)="openActions(pr)">
      <div class="card-content">
        <div class="card-header-row">
          <h3 class="pr-title">{{pr.descrizione}}</h3>
          <span class="pr-date">{{pr.getMaxPr().getDate()}}</span>
        </div>
        
        <div class="card-footer-row">
          <div class="pr-value-container">
            <span class="label">Personal Record</span>
            <div class="value-wrapper">
              <span class="value">{{pr.getMaxPr().prestazione | prestazione:pr.unity}}</span>
            </div>
          </div>
          
          <ion-button fill="clear" color="light" class="action-button" (click)="$event.stopPropagation(); openActions(pr)">
            <ion-icon slot="icon-only" name="ellipsis-horizontal-outline"></ion-icon>
          </ion-button>
        </div>
      </div>
    </div>
  }
</div>

<ion-fab vertical="bottom" horizontal="end" slot="fixed">
  <ion-fab-button class="main-fab" (click)="createActivity()">
    <ion-icon name="add"></ion-icon>
  </ion-fab-button>
</ion-fab>

<ion-action-sheet
  [isOpen]="isActionSheetOpen"
  header="Azioni"
  [buttons]="actionSheetButtons"
  (didDismiss)="actionSheetDidDismiss($event)"
></ion-action-sheet>
