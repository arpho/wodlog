@if (trendDetail()) {
  <ion-card class="trend-card glass-effect">
    <ion-card-header>
      <ion-card-title class="trend-title">
        <ion-text color="white">{{ trendDetail()?.descrizione || 'Attività' }}</ion-text>
      </ion-card-title>
      <ion-card-subtitle>
        <ion-text color="medium">{{ trendDetail()?.date | date:'dd/MM/yyyy' }}</ion-text>
      </ion-card-subtitle>
    </ion-card-header>

    <ion-card-content>
      <div class="trend-body">
        <div class="value-container">
          <ion-text class="trend-value">
            {{ trendDetail()?.value | prestazione:(trendDetail()?.unity || ' Kg ') }}
          </ion-text>
        </div>
        <div class="trend-indicator" [ngClass]="trendDetail()?.trend">
          <ion-icon [name]="trendDetail()?.trend === 'better' ? 'arrow-up-outline' : (trendDetail()?.trend === 'worse' ? 'arrow-down-outline' : 'remove-outline')"></ion-icon>
        </div>
      </div>

      @if (trendDetail()?.note) {
        <div class="trend-footer">
          <ion-note class="trend-note">"{{ trendDetail()?.note }}"</ion-note>
        </div>
      }
    </ion-card-content>
  </ion-card>
}
