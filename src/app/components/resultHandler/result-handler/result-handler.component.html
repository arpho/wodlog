<h1 >
  {{ showResult() }} @if (Result()?.rating) {
    <span class="rpe-inline">
      <ion-icon name="star" color="warning"></ion-icon>
      <span class="rpe-bars">
        @for (bar of rpeItems; track bar) {
          <span class="rpe-mini-bar" [class.active]="bar <= (Result().rating || 0)" [ngClass]="'color-' + getRpeColor(bar)" [style.height.px]="4 + (bar * 1.5)"></span>
        }
      </span>
      <span class="rpe-value">{{Result().rating}}</span>
    </span>
  }
</h1>
@if (showButton) {
  <ion-button (click)="updateResult()" color="light" slot="end" size="small" shape="round"><ion-icon name="create-outline"></ion-icon></ion-button>
}
