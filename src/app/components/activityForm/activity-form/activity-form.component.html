<div class="form-wrapper">
  
  <!-- Add a toolbar/header that acts as a close button when used in a modal -->
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-button (click)="close()">Chiudi</ion-button>
      </ion-buttons>
      <ion-title>Attività</ion-title>
      <ion-buttons slot="end">
        <ion-button color="danger" (click)="delete()">Elimina</ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-card class="activity-card">
    <ion-card-header>
      <ion-card-title>Dettagli Attività</ion-card-title>
    </ion-card-header>
    <ion-card-content>
      <ion-list lines="none">
        
        <ion-item class="input-item">
          <ion-input label="Specialità" (ionInput)="setDescrizione($event)" labelPlacement="floating" [value]="descrizione()"></ion-input>
        </ion-item>

        <ion-grid class="toggles-grid">
          <ion-row>
            <ion-col size="6">
              <ion-item class="toggle-item">
                <ion-toggle [checked]="hero()" [enableOnOffLabels]="true" (ionChange)="setHero($event)">Hero</ion-toggle>
              </ion-item>
            </ion-col>
            <ion-col size="6">
              <ion-item class="toggle-item">
                <ion-toggle [checked]="girl()" [enableOnOffLabels]="true" (ionChange)="setGirl($event)">Girl</ion-toggle>
              </ion-item>
            </ion-col>
          </ion-row>

          <ion-row>
            <ion-col size="6">
              <ion-item class="toggle-item">
                <ion-toggle [checked]="typePr()==='benchmark'" [enableOnOffLabels]="true" (ionChange)="setTypePr($event)">{{showPrType()}}</ion-toggle>
              </ion-item>
            </ion-col>
            <ion-col size="6">
              <ion-item class="toggle-item">
                <ion-toggle [checked]="unity().includes('sec')" (ionChange)="setUnity($event)">{{showUnity()}}</ion-toggle>
              </ion-item>
            </ion-col>
          </ion-row>
        </ion-grid>

      </ion-list>
    </ion-card-content>
  </ion-card>

  <ion-segment class="view-segment sticky-segment" [value]="showList ? 'list' : 'graph'" (ionChange)="switchViewSegment($event)">
    <ion-segment-button value="list">
      <ion-label>Lista</ion-label>
    </ion-segment-button>
    <ion-segment-button value="graph">
      <ion-label>Grafico</ion-label>
    </ion-segment-button>
  </ion-segment>

  <div class="data-view-container">
    @if(showList){
      <app-pr-list [prList]="prList()" [unity]="unity()" (editedPrList)="setPrList($event)"></app-pr-list>
    }
    @else {
      <app-pr-graph [prList]="prList()" [unity]="unity()"></app-pr-graph>
    }
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button color="light" (click)="submit()">
      <ion-icon name="save-outline"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</div>
