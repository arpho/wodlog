<div class="form-wrapper glass-effect">
  
  <ion-header class="ion-no-border">
    <ion-toolbar transparent>
      <ion-buttons slot="start">
        <ion-button (click)="close()" color="medium">Chiudi</ion-button>
      </ion-buttons>
      <ion-title>Dettagli Attività</ion-title>
      <ion-buttons slot="end">
        <ion-button color="danger" fill="clear" (click)="delete()">
          <ion-icon slot="icon-only" name="trash-outline"></ion-icon>
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <div class="scroll-container">
    <div class="input-section">
      <div class="modern-input-wrapper">
        <ion-input label="Specialità" (ionInput)="setDescrizione($event)" labelPlacement="stacked" [value]="descrizione()" class="modern-input" placeholder="Es. Thrusters, Burpees..."></ion-input>
      </div>

      <div class="toggles-container">
        <div class="toggle-card glass-effect">
          <ion-label>Hero</ion-label>
          <ion-toggle [checked]="hero()" [enableOnOffLabels]="true" (ionChange)="setHero($event)"></ion-toggle>
        </div>
        <div class="toggle-card glass-effect">
          <ion-label>Girl</ion-label>
          <ion-toggle [checked]="girl()" [enableOnOffLabels]="true" (ionChange)="setGirl($event)"></ion-toggle>
        </div>
        <div class="toggle-card glass-effect">
          <ion-label>{{showPrType()}}</ion-label>
          <ion-toggle [checked]="typePr()==='benchmark'" [enableOnOffLabels]="true" (ionChange)="setTypePr($event)"></ion-toggle>
        </div>
        <div class="toggle-card glass-effect">
          <ion-label>{{showUnity()}}</ion-label>
          <ion-toggle [checked]="unity().includes('sec')" [enableOnOffLabels]="true" (ionChange)="setUnity($event)"></ion-toggle>
        </div>
      </div>
    </div>

    <div class="view-selector">
      <ion-segment [value]="showList ? 'list' : 'graph'" (ionChange)="switchViewSegment($event)" mode="ios">
        <ion-segment-button value="list">
          <ion-label>Lista</ion-label>
        </ion-segment-button>
        <ion-segment-button value="graph">
          <ion-label>Grafico</ion-label>
        </ion-segment-button>
      </ion-segment>
    </div>

    <div class="data-view-container">
      @if(showList){
        <app-pr-list [prList]="prList()" [unity]="unity()" (editedPrList)="setPrList($event)"></app-pr-list>
      }
      @else {
        <app-pr-graph [prList]="prList()" [unity]="unity()"></app-pr-graph>
      }
    </div>
  </div>

  <ion-fab slot="fixed" vertical="bottom" horizontal="end">
    <ion-fab-button class="save-fab" (click)="submit()">
      <ion-icon name="checkmark"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</div>
