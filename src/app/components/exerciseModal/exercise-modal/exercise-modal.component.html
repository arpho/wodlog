<ion-header>
  <ion-toolbar>
    <ion-title>{{ title }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="cancel()">
        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input
      type="text"
      label="Nome esercizio"
      labelPlacement="floating"
      [(ngModel)]="exerciseName"
      (keyup.enter)="confirm()"
      autofocus="true"
    ></ion-input>
  </ion-item>
</ion-content>

<ion-footer>
  <ion-toolbar>
    <div style="display: flex; justify-content: space-between; padding: 0 16px;">
      
      @if (isEditing) {
        <ion-button color="danger" fill="clear" (click)="remove()">
          Rimuovi
          <ion-icon slot="start" name="trash-outline"></ion-icon>
        </ion-button>
      } @else {
        <!-- Placeholder for flex alignment if not editing -->
        <div style="width: 1px;"></div>
      }

      <ion-button color="primary" fill="solid" (click)="confirm()">
        Salva
        <ion-icon slot="start" name="save-outline"></ion-icon>
      </ion-button>
    </div>
  </ion-toolbar>
</ion-footer>
